<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--wb-bg);font-family:var(--wb-font-sans)}
.wrap{display:grid;grid-template-columns:1.2fr 1fr;gap:16px}
.panel{background:var(--wb-card);border:1px solid var(--wb-border);border-radius:14px;padding:16px}
.line{display:flex;align-items:baseline;justify-content:space-between;padding:6px 0;gap:10px}
.line + .line{border-top:1px solid rgba(255,255,255,0.04)}
.name{font-size:13px;font-weight:600}
.h{font-family:ui-monospace,monospace;font-size:10px;color:var(--wb-text-muted)}
.borderbox{height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--wb-text-secondary);font-weight:600}
</style></head><body class="wb-dark">
<div class="wrap">
<div class="panel">
  <div class="line"><span class="name" style="color:#F4F4F6">Основной текст</span><span class="h">#F4F4F6</span></div>
  <div class="line"><span class="name" style="color:#9CA3AF">Вторичный текст</span><span class="h">#9CA3AF</span></div>
  <div class="line"><span class="name" style="color:#6B7280">Приглушённый / muted</span><span class="h">#6B7280</span></div>
  <div class="line"><span class="name" style="color:#A78BFA">Акцент на тёмном</span><span class="h">accent-light</span></div>
</div>
<div style="display:flex;flex-direction:column;gap:10px">
  <div class="borderbox" style="background:var(--wb-card);border:1px solid rgba(255,255,255,0.06)">border · rgba .06</div>
  <div class="borderbox" style="background:var(--wb-card);border:1px solid rgba(255,255,255,0.10)">border-light · rgba .10</div>
  <div class="borderbox" style="background:var(--wb-card);border:1px solid rgba(124,106,255,0.30);box-shadow:inset 0 0 0 1px rgba(124,106,255,0.15)">accent border · state "current"</div>
</div>
</div>
</body></html>
