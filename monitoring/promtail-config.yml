server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: network
            values: ["wishlist-network"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_name']
        regex: '/wishlist-(api|web|bot)-1'
        target_label: 'service'
        replacement: '$1'
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            msg: msg
            service: service
      - labels:
          level:
          service:
