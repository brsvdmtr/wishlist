<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WishBoard · Mini App UI Kit (v2 · 2026)</title>
  <style>
/*
 * WishBoard Mini App — modern 2026 refresh.
 * Softer glass surfaces, mesh-gradient hero, liquid-glass nav,
 * chroma-shift accents, tighter rhythm, thinner hairlines.
 */

.wb-phone {
  /* surfaces — dark (default) */
  --wb-bg: #0F0F12;
  --wb-bg-elev: #15151A;
  --wb-surface: rgba(255,255,255,0.035);
  --wb-surface-hover: rgba(255,255,255,0.06);
  --wb-card: rgba(255,255,255,0.045);
  --wb-card-strong: rgba(255,255,255,0.07);
  --wb-nav-bg: rgba(15,15,18,0.72);
  --wb-border: rgba(255,255,255,0.06);
  --wb-border-strong: rgba(255,255,255,0.12);
  --wb-hairline: rgba(255,255,255,0.04);

  /* accent — violet (default) */
  --wb-accent: #8B7BFF;
  --wb-accent-strong: #B4A6FF;
  --wb-accent-light: #C8BDFF;
  --wb-accent-deep: #5B48E5;
  --wb-accent-r: 139; --wb-accent-g: 123; --wb-accent-b: 255;

  --wb-accent-soft: rgba(var(--wb-accent-r), var(--wb-accent-g), var(--wb-accent-b), 0.14);
  --wb-accent-soft-strong: rgba(var(--wb-accent-r), var(--wb-accent-g), var(--wb-accent-b), 0.30);
  --wb-accent-shadow: rgba(var(--wb-accent-r), var(--wb-accent-g), var(--wb-accent-b), 0.45);
  --wb-accent-shadow-soft: rgba(var(--wb-accent-r), var(--wb-accent-g), var(--wb-accent-b), 0.25);

  --wb-success: #4ADE80;
  --wb-success-soft: rgba(74,222,128,0.14);
  --wb-warning: #FBBF24;
  --wb-warning-soft: rgba(251,191,36,0.14);
  --wb-danger: #FB7185;
  --wb-danger-soft: rgba(251,113,133,0.14);

  --wb-text: #FFFFFF;
  --wb-text-secondary: #C7CAD1;
  --wb-text-muted: #8F94A3;
  --wb-font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;

  /* chroma mesh — layered behind the phone content */
  --wb-mesh:
    radial-gradient(ellipse 80% 60% at 12% 0%, rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.22), transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 20%, rgba(255,120,180,0.10), transparent 55%),
    radial-gradient(ellipse 100% 70% at 50% 110%, rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.10), transparent 65%);
}

.wb-phone[data-theme="black"] {
  --wb-bg: #000;
  --wb-bg-elev: #070709;
  --wb-surface: rgba(255,255,255,0.04);
  --wb-surface-hover: rgba(255,255,255,0.07);
  --wb-card: rgba(255,255,255,0.05);
  --wb-card-strong: rgba(255,255,255,0.08);
  --wb-nav-bg: rgba(0,0,0,0.78);
  --wb-border: rgba(255,255,255,0.07);
  --wb-border-strong: rgba(255,255,255,0.14);
  --wb-hairline: rgba(255,255,255,0.05);
  --wb-mesh:
    radial-gradient(ellipse 80% 60% at 12% 0%, rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.18), transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 20%, rgba(255,120,180,0.06), transparent 55%);
}

.wb-phone[data-accent="blue"]  { --wb-accent:#5B8DEF; --wb-accent-strong:#86ABF5; --wb-accent-light:#B5CDF9; --wb-accent-deep:#2F61C8; --wb-accent-r:91; --wb-accent-g:141; --wb-accent-b:239; }
.wb-phone[data-accent="pink"]  { --wb-accent:#F06AB4; --wb-accent-strong:#F892C9; --wb-accent-light:#FCBCDD; --wb-accent-deep:#C53F88; --wb-accent-r:240; --wb-accent-g:106; --wb-accent-b:180; }
.wb-phone[data-accent="green"] { --wb-accent:#34C98A; --wb-accent-strong:#58D9A3; --wb-accent-light:#88E6BC; --wb-accent-deep:#1E9765; --wb-accent-r:52; --wb-accent-g:201; --wb-accent-b:138; }

.wb-app *, .wb-app *::before, .wb-app *::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
.wb-app { font-family:var(--wb-font); color:var(--wb-text); line-height:1.35; letter-spacing:-0.011em; }

.wb-phone {
  width:375px; min-height:812px;
  background:var(--wb-bg); border-radius:52px;
  position:relative; overflow:hidden;
  box-shadow: 0 60px 120px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #111114, 0 0 0 11px #000;
  flex-shrink:0;
  isolation:isolate;
}
.wb-phone::before { content:''; position:absolute; inset:0; background:var(--wb-mesh); pointer-events:none; z-index:0; }
.wb-phone > * { position:relative; z-index:1; }

.wb-status { height:52px; padding:18px 28px 0; display:flex; justify-content:space-between; align-items:flex-start; font-size:15px; font-weight:600; }
.wb-status-icons { display:flex; gap:6px; align-items:center; font-size:13px }

.wb-hdr { height:56px; padding:8px 14px; display:flex; align-items:center; gap:8px; }
.wb-hdr-btn { width:40px; height:40px; border-radius:14px; background:var(--wb-surface); border:1px solid var(--wb-border); backdrop-filter:blur(20px) saturate(140%); display:flex; align-items:center; justify-content:center; color:var(--wb-text); font-size:17px; cursor:pointer; flex-shrink:0; transition:all .15s ease; }
.wb-hdr-btn:active { background:var(--wb-surface-hover); transform:scale(.94); }
.wb-hdr-title { flex:1; text-align:center; font-size:16px; font-weight:650; letter-spacing:-0.018em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--wb-text); }
.wb-hdr-sub { font-size:11px; color:var(--wb-text-muted); font-weight:500; margin-top:1px; letter-spacing:0 }

.wb-tabs { display:flex; gap:2px; padding:3px; background:var(--wb-surface); border:1px solid var(--wb-border); border-radius:14px; margin:0 16px 14px; backdrop-filter:blur(20px); }
.wb-tab { flex:1; padding:9px 10px; border-radius:11px; text-align:center; font-size:13px; font-weight:600; color:var(--wb-text-muted); cursor:pointer; transition:all .18s cubic-bezier(.4,0,.2,1); position:relative; letter-spacing:-0.005em; }
.wb-tab.active { background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05)); color:var(--wb-text); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 1px 3px rgba(0,0,0,0.3); }
.wb-tab .wb-tab-badge { position:absolute; top:3px; right:6px; width:16px; height:16px; border-radius:50%; background:var(--wb-accent); color:#fff; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; line-height:1 }

.wb-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin:0 16px 18px; }
.wb-stat { background:var(--wb-card); border:1px solid var(--wb-border); border-radius:16px; padding:12px 6px 10px; text-align:center; backdrop-filter:blur(16px); }
.wb-stat-n { font-size:22px; font-weight:700; letter-spacing:-0.03em; line-height:1; color:var(--wb-text); font-feature-settings:'tnum'; }
.wb-stat-l { font-size:10px; color:var(--wb-text-muted); margin-top:4px; letter-spacing:0.1px; }
.wb-stat.accent  .wb-stat-n { color:var(--wb-accent-strong); }
.wb-stat.success .wb-stat-n { color:var(--wb-success); }
.wb-stat.warning .wb-stat-n { color:var(--wb-warning); }

.wb-section-hdr { display:flex; align-items:baseline; justify-content:space-between; padding:0 20px; margin-bottom:10px; }
.wb-section-hdr h2 { margin:0; font-size:12px; font-weight:600; color:var(--wb-text-muted); text-transform:uppercase; letter-spacing:0.7px; }
.wb-section-hdr .wb-link { font-size:13px; color:var(--wb-accent-strong); font-weight:550; cursor:pointer; }

.wb-wl-card { background:var(--wb-card); border:1px solid var(--wb-border); border-radius:22px; padding:18px; margin:0 16px 10px; cursor:pointer; transition:all .2s cubic-bezier(.4,0,.2,1); backdrop-filter:blur(16px); position:relative; overflow:hidden; }
.wb-wl-card:active { transform:scale(.99); background:var(--wb-card-strong); }
.wb-wl-card.highlight { background:linear-gradient(135deg, var(--wb-card-strong), var(--wb-accent-soft)); border-color:var(--wb-accent-soft-strong); }
.wb-wl-card.highlight::before { content:''; position:absolute; top:-40%; right:-20%; width:180px; height:180px; background:radial-gradient(circle, var(--wb-accent-soft-strong), transparent 65%); pointer-events:none; }
.wb-wl-card-top { display:flex; align-items:flex-start; gap:14px; margin-bottom:14px; position:relative; }
.wb-wl-emoji { width:54px; height:54px; border-radius:18px; background:linear-gradient(135deg, var(--wb-accent-soft-strong), var(--wb-accent-soft)); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); }
.wb-wl-meta { flex:1; min-width:0; }
.wb-wl-title { font-size:17px; font-weight:650; letter-spacing:-0.02em; color:var(--wb-text); }
.wb-wl-sub { font-size:13px; color:var(--wb-text-secondary); margin-top:3px; letter-spacing:-0.005em }
.wb-wl-progress { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
.wb-wl-progress > div { height:100%; background:linear-gradient(90deg, var(--wb-accent), var(--wb-accent-strong)); border-radius:2px; box-shadow: 0 0 12px var(--wb-accent-shadow-soft); }
.wb-wl-foot { display:flex; align-items:center; justify-content:space-between; margin-top:12px; }
.wb-wl-foot-txt { font-size:12px; color:var(--wb-text-muted); font-feature-settings:'tnum'; }

.wb-stack { display:flex; align-items:center; }
.wb-av { border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:650; flex-shrink:0; width:28px; height:28px; font-size:11px; border:2px solid var(--wb-bg); box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); }
.wb-av:not(:first-child) { margin-left:-8px; }
.wb-av.g1 { background:linear-gradient(135deg,#8B7BFF,#B4A6FF); }
.wb-av.g2 { background:linear-gradient(135deg,#FBBF24,#F59E0B); }
.wb-av.g3 { background:linear-gradient(135deg,#4ADE80,#10B981); }
.wb-av.g4 { background:linear-gradient(135deg,#F892C9,#F06AB4); }
.wb-av.g5 { background:linear-gradient(135deg,#86ABF5,#5B8DEF); }
.wb-av.plus { background:var(--wb-surface); color:var(--wb-text-secondary); }

.wb-wish { display:flex; gap:14px; align-items:center; background:var(--wb-card); border:1px solid var(--wb-border); border-radius:18px; padding:12px 14px 12px 12px; margin:0 16px 8px; cursor:pointer; transition:all .15s ease; backdrop-filter:blur(14px); }
.wb-wish:active { background:var(--wb-card-strong); transform:scale(.995); }
.wb-wish-thumb { width:50px; height:50px; border-radius:14px; background:linear-gradient(135deg, var(--wb-accent-soft-strong), var(--wb-accent-soft)); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.wb-wish-body { flex:1; min-width:0; }
.wb-wish-t { font-size:15px; font-weight:600; letter-spacing:-0.015em; line-height:1.3; color:var(--wb-text); }
.wb-wish-price { font-size:13px; font-weight:650; margin-top:2px; color:var(--wb-text-secondary); font-feature-settings:'tnum'; }
.wb-wish-meta { display:flex; gap:6px; align-items:center; margin-top:6px; font-size:11px; color:var(--wb-text-muted); flex-wrap:wrap }
.wb-wish-trail { font-size:18px; color:var(--wb-text-muted); flex-shrink:0; }
.wb-wish.reserved-by-me { background:linear-gradient(135deg, var(--wb-card), rgba(74,222,128,0.09)); border-color:rgba(74,222,128,0.28); }
.wb-wish.reserved-by-me .wb-wish-thumb { background:linear-gradient(135deg, rgba(74,222,128,0.28), rgba(74,222,128,0.10)); }
.wb-wish.done { opacity:.45; }
.wb-wish.done .wb-wish-t { text-decoration:line-through; color:var(--wb-text-muted); }

.wb-chip { display:inline-flex; align-items:center; gap:3px; padding:3px 8px; border-radius:7px; font-size:10px; font-weight:650; white-space:nowrap; line-height:1.4; letter-spacing:0.1px; }
.wb-chip.accent { background:var(--wb-accent-soft); color:var(--wb-accent-strong); }
.wb-chip.success { background:var(--wb-success-soft); color:var(--wb-success); }
.wb-chip.warning { background:var(--wb-warning-soft); color:var(--wb-warning); }
.wb-chip.danger  { background:var(--wb-danger-soft);  color:var(--wb-danger); }
.wb-chip.pro { background:linear-gradient(135deg, var(--wb-accent), var(--wb-accent-deep)); color:#fff; border-radius:100px; padding:3px 9px; letter-spacing:0.4px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.18); }
.wb-chip.prio3 { background: rgba(251,113,133,0.18); color:#FB7185; }
.wb-chip.prio2 { background: rgba(251,191,36,0.18); color:#FBBF24; }

.wb-fab { position:absolute; right:20px; bottom:96px; width:58px; height:58px; border-radius:20px; background:linear-gradient(135deg, var(--wb-accent), var(--wb-accent-deep)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:300; box-shadow: 0 14px 40px var(--wb-accent-shadow), inset 0 1px 0 rgba(255,255,255,0.24), 0 1px 2px rgba(0,0,0,0.3); cursor:pointer; z-index:5; border:none; transition:transform .15s ease; }
.wb-fab:active { transform:scale(.92); }

.wb-nav { position:absolute; left:10px; right:10px; bottom:14px; display:flex; justify-content:space-around; padding:8px 6px 8px; background:var(--wb-nav-bg); backdrop-filter:blur(28px) saturate(180%); border:1px solid var(--wb-border); border-radius:26px; box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08); }
.wb-nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 4px; color:var(--wb-text-muted); font-size:10px; font-weight:550; cursor:pointer; position:relative; transition:color .2s ease; letter-spacing:0 }
.wb-nav-item .wb-nav-ic { font-size:20px; line-height:1 }
.wb-nav-item.active { color:var(--wb-accent-strong); }
.wb-nav-item.active::after { content:''; position:absolute; bottom:-3px; left:50%; transform:translateX(-50%); width:14px; height:3px; background:var(--wb-accent); border-radius:100px; box-shadow: 0 0 8px var(--wb-accent-shadow); }

.wb-btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:15px 22px; border-radius:18px; border:none; font-family:inherit; font-size:15px; font-weight:650; letter-spacing:-0.015em; cursor:pointer; min-height:52px; width:100%; transition:all .15s cubic-bezier(.4,0,.2,1); }
.wb-btn:active { transform:scale(.98); }
.wb-btn.primary { background:linear-gradient(135deg, var(--wb-accent), var(--wb-accent-deep)); color:#fff; box-shadow: 0 12px 32px var(--wb-accent-shadow), inset 0 1px 0 rgba(255,255,255,0.22); }
.wb-btn.secondary { background:var(--wb-accent-soft); color:var(--wb-accent-strong); border:1px solid var(--wb-accent-soft-strong); }
.wb-btn.surface { background:var(--wb-card-strong); color:var(--wb-text); border:1px solid var(--wb-border-strong); backdrop-filter:blur(14px); }
.wb-btn.ghost { background:transparent; color:var(--wb-text-secondary); }

.wb-scroll { overflow-y:auto; scrollbar-width:none; padding-bottom:120px; height:calc(812px - 52px - 56px); }
.wb-scroll::-webkit-scrollbar { display:none; }

.wb-hero { margin:4px 16px 16px; padding:22px; border-radius:26px; color:#fff; position:relative; overflow:hidden;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.25), transparent 45%),
    radial-gradient(circle at 100% 100%, var(--wb-accent-deep), transparent 55%),
    linear-gradient(135deg, var(--wb-accent) 0%, var(--wb-accent-strong) 100%);
  box-shadow: 0 20px 50px -12px var(--wb-accent-shadow), inset 0 1px 0 rgba(255,255,255,0.24); }
.wb-hero::before { content:''; position:absolute; top:-30%; right:-10%; width:260px; height:260px; background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 70%); pointer-events:none; filter: blur(8px); }
.wb-hero-top { display:flex; gap:14px; align-items:flex-start; position:relative; z-index:1; }
.wb-hero-emoji { font-size:44px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2)); }
.wb-hero-title { font-size:26px; font-weight:700; letter-spacing:-0.035em; line-height:1.05 }
.wb-hero-sub { font-size:13px; opacity:0.85; margin-top:4px; letter-spacing:-0.005em }
.wb-hero-stats { display:flex; gap:18px; margin-top:18px; position:relative; z-index:1; }
.wb-hero-stat { flex:1 }
.wb-hero-stat-n { font-size:24px; font-weight:700; letter-spacing:-0.03em; font-feature-settings:'tnum' }
.wb-hero-stat-l { font-size:11px; opacity:0.75; margin-top:2px; }

.wb-banner { display:flex; gap:11px; margin:0 16px 12px; padding:13px 15px; border-radius:16px; font-size:13px; line-height:1.5; align-items:flex-start; color:var(--wb-text); backdrop-filter:blur(14px); }
.wb-banner-ic { flex-shrink:0; font-size:17px; margin-top:1px; }
.wb-banner.info { background:var(--wb-accent-soft); border:1px solid var(--wb-accent-soft-strong); }
.wb-banner.success { background:var(--wb-success-soft); border:1px solid rgba(74,222,128,0.28); }

.wb-onb { height:calc(812px - 52px); display:flex; flex-direction:column; padding:24px 28px 40px; }
.wb-onb-visual { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
.wb-onb-glow { width:280px; height:280px; border-radius:50%;
  background: radial-gradient(circle, var(--wb-accent-shadow) 0%, transparent 70%);
  position:absolute; filter: blur(20px); }
.wb-onb-glow::after { content:''; position:absolute; inset:40px; border-radius:50%;
  background: radial-gradient(circle, var(--wb-accent-strong) 0%, transparent 65%); opacity:.4; filter: blur(30px); }
.wb-onb-emoji { font-size:128px; position:relative; filter: drop-shadow(0 20px 40px var(--wb-accent-shadow)); }
.wb-onb h1 { font-size:30px; font-weight:700; letter-spacing:-0.035em; margin:0 0 10px; text-align:center; color:var(--wb-text); line-height:1.08; text-wrap:pretty; }
.wb-onb p { font-size:15px; color:var(--wb-text-secondary); margin:0 0 28px; text-align:center; line-height:1.5; letter-spacing:-0.005em; text-wrap:pretty; }
.wb-onb-dots { display:flex; gap:5px; justify-content:center; margin-bottom:20px; }
.wb-onb-dots span { width:6px; height:6px; border-radius:50%; background:var(--wb-text-muted); opacity:.25; transition:all .25s ease; }
.wb-onb-dots span.active { background:var(--wb-accent); opacity:1; width:22px; border-radius:3px; }

.wb-paywall-title { font-size:32px; font-weight:700; letter-spacing:-0.035em; text-align:center; margin:14px 16px 6px; color:var(--wb-text); line-height:1.05 }
.wb-paywall-title .wb-gradient-text { background:linear-gradient(135deg, var(--wb-accent) 20%, var(--wb-accent-strong) 80%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.wb-paywall-sub { font-size:15px; color:var(--wb-text-secondary); text-align:center; margin:0 24px 22px; line-height:1.45; letter-spacing:-0.005em; text-wrap:pretty; }
.wb-feat { display:flex; align-items:center; gap:14px; padding:14px 16px; background:var(--wb-card); border:1px solid var(--wb-border); border-radius:18px; margin:0 16px 8px; backdrop-filter:blur(14px); }
.wb-feat-ic { width:42px; height:42px; border-radius:13px; background:linear-gradient(135deg, var(--wb-accent-soft-strong), var(--wb-accent-soft)); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; box-shadow: inset 0 1px 0 rgba(255,255,255,0.08) }
.wb-feat-t { font-size:15px; font-weight:600; color:var(--wb-text); letter-spacing:-0.012em }
.wb-feat-s { font-size:12.5px; color:var(--wb-text-secondary); margin-top:2px; letter-spacing:-0.003em }

.wb-sheet-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:10; opacity:0; pointer-events:none; transition:opacity .25s; }
.wb-sheet-backdrop.open { opacity:1; pointer-events:auto; }
.wb-sheet { position:absolute; left:0; right:0; bottom:0; background:var(--wb-bg-elev); border:1px solid var(--wb-border); border-bottom:none; border-radius:28px 28px 0 0; padding:24px; z-index:11; transform:translateY(100%); transition:transform .32s cubic-bezier(.25,.8,.35,1); box-shadow: 0 -20px 60px rgba(0,0,0,0.5); }
.wb-sheet.open { transform:translateY(0); }
.wb-sheet-handle { width:40px; height:4px; background:rgba(255,255,255,0.18); border-radius:2px; margin:-10px auto 20px; }
.wb-sheet-title { font-size:19px; font-weight:650; text-align:center; letter-spacing:-0.025em; margin-bottom:8px; color:var(--wb-text); text-wrap:pretty; }
.wb-sheet-sub { font-size:13.5px; color:var(--wb-text-secondary); text-align:center; margin-bottom:20px; line-height:1.5; text-wrap:pretty; }

/* ─── Settings ─── */
.wb-set-group { margin:0 16px 16px; background:var(--wb-card); border:1px solid var(--wb-border); border-radius:20px; overflow:hidden; backdrop-filter:blur(16px); }
.wb-set-row { display:flex; align-items:center; gap:14px; padding:14px 16px; border-top:1px solid var(--wb-hairline); cursor:pointer; }

.wb-cal-header { display:flex; align-items:center; justify-content:space-between; padding:0 20px 12px; }

  <script type="text/babel">
  const { useState, createContext, useContext } = React;
  const ThemeCtx = createContext({ theme:'dark', accent:'violet', isPro:false, setTheme:()=>{}, setAccent:()=>{}, setIsPro:()=>{} });

  function Phone({ children }) {

  function StatusBar() {
    return <div className="wb-status"><div>9:41</div><div className="wb-status-icons"><span>•••</span><span>5G</span><span style={{marginLeft:4}}>◼</span></div></div>;

        {right || <div style={{width:40}} />}
      </div>
    );
  }

            <div className={`wb-seg ${visibility === 'public' ? 'active' : ''}`} onClick={() => setVisibility('public')}><span className="wb-seg-ic">👁</span>Открыто</div>
            <div className={`wb-seg ${visibility === 'surprise' ? 'active' : ''}`} onClick={() => setVisibility('surprise')}><span className="wb-seg-ic">🤫</span>Сюрприз</div>

          <div style={{height:120}} />

          <Button variant="primary" onClick={onSave}>{imported ? 'Добавить желание' : title ? 'Добавить желание' : 'Заполни название'}</Button>
        </div>
      </Phone>
    );
  }
  </script>

  <script type="text/babel">

    const days = [
      { d:30, out:true }, { d:1 },
      { d:2 }, { d:3 }, { d:4 }, { d:5, we:true }, { d:6, we:true },
      { d:7 }, { d:8 }, { d:9 }, { d:10, event:'accent', emoji:'🎂' }, { d:11 }, { d:12, we:true }, { d:13, we:true },
      { d:14 }, { d:15 }, { d:16, event:'wed', emoji:'💍' }, { d:17 }, { d:18 }, { d:19, we:true, today:true }, { d:20, we:true },
      { d:21 }, { d:22, event:'bday', emoji:'🎉' }, { d:23 }, { d:24 }, { d:25 }, { d:26, we:true }, { d:27, we:true },
      { d:28 }, { d:29 }, { d:30 }, { d:31, event:'ny', emoji:'🎄' }, { d:1, out:true }, { d:2, out:true, we:true }, { d:3, out:true, we:true },

  </script>

  <script type="text/babel">
  const STORAGE_KEY = 'wb-uikit-state-v3';
  function App() {
    const initial = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } })();
    const [screen, setScreen] = React.useState(initial.screen || 'all');
    const [nav, setNav] = React.useState('home');
    const [onbStep, setOnbStep] = React.useState(0);
    const [theme, setTheme] = React.useState(initial.theme || 'dark');
    const [accent, setAccent] = React.useState(initial.accent || 'violet');
    const [isPro, setIsPro] = React.useState(initial.isPro ?? false);
    React.useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ screen, theme, accent, isPro })); } catch {} }, [screen, theme, accent, isPro]);
    const ctx = { theme, accent, isPro, setTheme, setAccent, setIsPro };
    const buttons = [
      { id:'all', label:'All screens' },
      { id:'onboarding', label:'Onboarding' },
      { id:'home', label:'Home' },
      { id:'detail', label:'Wishlist · Guest' },
      { id:'create', label:'Create wish' },
      { id:'paywall', label:'Paywall' },
      { id:'settings', label:'Settings' },
    ];
    const show = (id) => screen === 'all' || screen === id;
    return (
      <ThemeCtx.Provider value={ctx}>
        <div className="nav-links">{buttons.map(b => (<button key={b.id} className={screen === b.id ? 'on' : ''} onClick={() => setScreen(b.id)}>{b.label}</button>))}</div>
        <div className="global-controls">
          <label><input type="checkbox" checked={isPro} onChange={(e) => setIsPro(e.target.checked)} /> PRO demo</label>
          <label>Тема&nbsp;<select value={theme} onChange={(e) => setTheme(e.target.value)} style={{background:'transparent',color:'#F4F4F6',border:'none',fontSize:12,fontWeight:600,outline:'none'}}><option value="dark">Dark (default)</option><option value="black" disabled={!isPro}>Black (PRO)</option></select></label>
          <label>Акцент&nbsp;<select value={accent} onChange={(e) => setAccent(e.target.value)} style={{background:'transparent',color:'#F4F4F6',border:'none',fontSize:12,fontWeight:600,outline:'none'}}><option value="violet">Violet (free)</option><option value="blue" disabled={!isPro}>Blue (PRO)</option><option value="pink" disabled={!isPro}>Pink (PRO)</option><option value="green" disabled={!isPro}>Green (PRO)</option></select></label>
        </div>
        <div className="phones">
          {show('onboarding') && (<div className="phone-wrap"><OnboardingScreen step={onbStep} onNext={() => setOnbStep(s => (s + 1) % 3)} onSkip={() => setScreen('home')} /><div className="phone-label">Onboarding · шаг {onbStep + 1}/3</div></div>)}
          {show('home') && (<div className="phone-wrap"><HomeScreen navActive={nav} onNav={(id) => { setNav(id); if (id === 'reservations') setScreen('detail'); }} onOpenWishlist={() => setScreen('detail')} onCreate={() => setScreen('create')} onOpenSettings={() => setScreen('settings')} /><div className="phone-label">Home · Мои вишлисты</div></div>)}
          {show('detail') && (<div className="phone-wrap"><WishlistDetailScreen navActive={nav} onNav={setNav} onBack={() => setScreen('home')} /><div className="phone-label">Wishlist · Guest (surprise)</div></div>)}
          {show('create') && (<div className="phone-wrap"><CreateWishScreen onBack={() => setScreen('home')} onSave={() => setScreen('home')} /><div className="phone-label">Create wish · импорт по ссылке</div></div>)}
          {show('paywall') && (<div className="phone-wrap"><PaywallScreen navActive={nav} onNav={setNav} onBack={() => setScreen('home')} onSubscribe={() => { setIsPro(true); setScreen('settings'); }} /><div className="phone-label">Paywall · PRO</div></div>)}
          {show('settings') && (<div className="phone-wrap"><SettingsScreen navActive={nav} onNav={setNav} onBack={() => setScreen('home')} onOpenPaywall={() => setScreen('paywall')} /><div className="phone-label">Settings · theme + accent</div></div>)}
        </div>
      </ThemeCtx.Provider>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
