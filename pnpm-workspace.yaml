packages:
  - 'apps/*'
  - 'packages/*'
  - 'infra/cloudflare/*'

# pnpm v10 blocks dependency build scripts by default. This allowlist makes
# installs work in CI and on fresh machines without manual approval.
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - prisma
  - unrs-resolver
