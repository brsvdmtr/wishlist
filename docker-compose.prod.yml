name: wishlist-prod

# Default Docker json-file logging cap shared by every service. Without this,
# stdout grows unbounded between recreates (audit 2026-05-07 found 0 caps on
# any service). 20 MB × 5 = ~100 MB rolling window per container — enough to
# investigate the average post-recreate incident, small enough that runaway
# logging cannot fill the disk before Docker rotates.
#
# This is a CAPPED ROLLING WINDOW on the lifetime of the running container,
# NOT a durable archive after recreate. For api/bot the durable archive lives
# in ./logs/{api,bot} via the bind-mount + pino. web/postgres still rely on
# this rolling window — see docs/INFRA_AND_ENV.md § Logging.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wishlist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wishlist}
    volumes:
      - wishlist_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-wishlist} -d ${POSTGRES_DB:-wishlist}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wishlist-network
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      DNS_RESULT_ORDER: ${DNS_RESULT_ORDER:-ipv4first}
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3001
      WEB_ORIGIN: ${WEB_ORIGIN}
      ADMIN_KEY: ${ADMIN_KEY}
      BOT_TOKEN: ${BOT_TOKEN}
      # Bot username for building referral deep links (t.me/<name>?start=ref_XXX).
      # Defaults to WishHub_bot (matches .env.example & web container).
      TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME:-WishHub_bot}
      # REQUIRED in production: >=16-char secret for hashing IPs/fingerprints in
      # ReferralAttribution. Without it, apps/api crashes on import (referral.ts
      # throws if NODE_ENV=production and salt is unset). Rotate = re-hash
      # existing rows (acceptable — hashes are only used for fraud clustering).
      REFERRAL_IP_HASH_SALT: ${REFERRAL_IP_HASH_SALT}
      AUTH_SECRET: ${AUTH_SECRET:-}
      SYSTEM_USER_EMAIL: ${SYSTEM_USER_EMAIL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      # Rotated JSON log on bind-mounted host dir — survives container recreation.
      # Set empty (LOG_FILE_PATH=) in .env to disable.
      LOG_FILE_PATH: ${LOG_FILE_PATH_API:-/app/logs/api.log}
      APP_RELEASE: ${APP_RELEASE:-unknown}
      UPLOAD_DIR: /data/uploads
      ONBOARDING_V2_ROLLOUT: ${ONBOARDING_V2_ROLLOUT:-ab50}
      MARKETPLACE_PARSER_DISABLED: ${MARKETPLACE_PARSER_DISABLED:-}
      SUPPORT_CHAT_ID: ${SUPPORT_CHAT_ID:-}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
      GOD_MODE_TELEGRAM_IDS: ${GOD_MODE_TELEGRAM_IDS:-}
      MINI_APP_URL: ${MINI_APP_URL:-https://wishlistik.ru/miniapp}
      # PRO pricing overrides (defaults matched in apps/api/src/index.ts).
      # Allows ops to A/B-test price or run temporary low-price test purchases
      # without a redeploy — edit /opt/wishlist/.env + restart api.
      PRO_PRICE_XTR: ${PRO_PRICE_XTR:-100}
      PRO_YEARLY_PRICE_XTR: ${PRO_YEARLY_PRICE_XTR:-800}
      PRO_YEARLY_EXTEND_SECONDS: ${PRO_YEARLY_EXTEND_SECONDS:-31536000}
      PRO_SUBSCRIPTION_PERIOD: ${PRO_SUBSCRIPTION_PERIOD:-2592000}
    volumes:
      - wishlist_uploads:/data/uploads
      - ./logs/api:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wishlist-network
    ports:
      - "127.0.0.1:3001:3001"
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME:-WishHub_bot}
      NEXT_PUBLIC_MINIAPP_SHORT_NAME: ${NEXT_PUBLIC_MINIAPP_SHORT_NAME:-}
      INTERNAL_API_BASE_URL: http://api:3001
      ADMIN_KEY: ${ADMIN_KEY}
      ADMIN_BASIC_USER: ${ADMIN_BASIC_USER}
      ADMIN_BASIC_PASS: ${ADMIN_BASIC_PASS}
      APP_RELEASE: ${APP_RELEASE:-unknown}
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - wishlist-network
    logging: *default-logging

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      API_BASE_URL: http://api:3001
      MINI_APP_URL: ${MINI_APP_URL:-https://wishlistik.ru/miniapp}
      SITE_URL: ${SITE_URL:-${NEXT_PUBLIC_SITE_URL:-https://wishlistik.ru}}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      # Rotated JSON log on bind-mounted host dir — survives container recreation.
      LOG_FILE_PATH: ${LOG_FILE_PATH_BOT:-/app/logs/bot.log}
      APP_RELEASE: ${APP_RELEASE:-unknown}
      ADMIN_ALERT_CHAT_IDS: ${ADMIN_ALERT_CHAT_IDS:-}
      SUPPORT_CHAT_ID: ${SUPPORT_CHAT_ID:-}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
      # Bot imports @wishlist/db (for tryCreateAttribution, resolveReferralCode),
      # which loads referral.ts → throws on import if salt is unset in prod.
      # MUST match the value set on the api container so hashes are consistent.
      REFERRAL_IP_HASH_SALT: ${REFERRAL_IP_HASH_SALT}
    volumes:
      - ./logs/bot:/app/logs
    depends_on:
      api:
        condition: service_started
    networks:
      - wishlist-network
    logging: *default-logging

networks:
  wishlist-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "fd00:dead:cafe::/48"

volumes:
  wishlist_pg_data:
  wishlist_uploads:
