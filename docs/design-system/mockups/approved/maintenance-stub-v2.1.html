<!doctype html>
<!--
  DRAFT v3 — Maintenance stub v2.1 (full-screen, warm copy, with notification promise)
  Status: proposed (awaiting approval)

  Changes vs v2:
    - Warmer, more reassuring copy ("Скоро вернёмся" instead of "Технические работы").
    - Notification hint RESTORED across all 6 locales — now backed by CF Worker + KV
      buffer architecture (see notes below). Promise becomes deliverable at L1 too.

  Deployment targets (this exact file is the source-of-truth):
    1. ops/maintenance/maintenance.html — nginx `error_page 502 503 504` (L2: web down, API alive).
    2. infra/cloudflare/maintenance-worker/src/maintenance.html.txt — embedded into the
       CF Worker that intercepts origin-unreachable codes (521/522/523/524/525/526/520)
       (L1: origin completely unreachable).
    Both deployments serve the IDENTICAL bytes — design language is uniform across slices.

  Notification flow at L1 (after CF Worker + KV ships):
    - HTML reads window.Telegram.WebApp.initData (auth payload signed by Bot API).
    - POSTs to /__cf-maintenance-exposure (worker-owned path, never proxied to origin).
    - Worker validates initData HMAC server-side → extracts user_id, locale → writes
      KV record `exposure:<bucket>:<tg_user_id>` with 7-day TTL.
    - When origin recovers, the watchdog (ops/watchdog/health-watchdog.mjs) pulls buffered
      records via /__cf-maintenance-drain (shared-secret) and ingests them as
      MaintenanceExposure rows. Existing recovery-notification fan-out (internal.routes.ts
      /maintenance/send-recovery-notifications) then notifies them via bot.

  Notification flow at L2 (nginx-served):
    - Same POST hits the live API (since only web is down, API is up) → same result.
  Notification flow at L3 (in-app screen): existing in-app POST /tg/maintenance-exposure path.

  Self-contained — NO external assets (CDN, fonts, scripts). Works when origin is dead.
  Locales (6): ru, en, zh-CN, hi, es, ar. RTL: ar. Reduced-motion respected.
  Tap target ≥ 48px. Safe-area aware.
-->
<html lang="ru" dir="ltr" data-loc="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="robots" content="noindex, nofollow" />
  <title>WishBoard — Скоро вернёмся</title>
  <style>
    :root {
      --wb-bg: #0F0F12;
      --wb-border: rgba(255,255,255,0.06);
      --wb-accent: #8B7BFF;
      --wb-accent-strong: #B4A6FF;
      --wb-accent-light: #C8BDFF;
      --wb-accent-deep: #5B48E5;
      --wb-accent-r: 139; --wb-accent-g: 123; --wb-accent-b: 255;
      --wb-accent-soft: rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.14);
      --wb-accent-soft-strong: rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.32);
      --wb-accent-shadow: rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.45);
      --wb-accent-shadow-soft: rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.25);
      --wb-text: #FFFFFF;
      --wb-text-secondary: #C7CAD1;
      --wb-text-muted: #8F94A3;
      --wb-font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--wb-bg);
      color: var(--wb-text);
      font-family: var(--wb-font);
      letter-spacing: -0.011em;
      line-height: 1.4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(40px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(40px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 12% 0%,  rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.28), transparent 58%),
        radial-gradient(ellipse 70% 60% at 100% 20%, rgba(255,120,180,0.13), transparent 58%),
        radial-gradient(ellipse 120% 80% at 50% 110%, rgba(var(--wb-accent-r),var(--wb-accent-g),var(--wb-accent-b),0.16), transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .glow {
      width: 124px; height: 124px;
      margin: 0 auto 36px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .glow::before {
      content: '';
      position: absolute; inset: -32px;
      background: radial-gradient(circle, var(--wb-accent-soft-strong), transparent 70%);
      border-radius: 50%;
      animation: wb-pulse 3.2s ease-in-out infinite;
    }
    .glow-orb {
      width: 124px; height: 124px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--wb-accent-strong), var(--wb-accent-deep));
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        0 20px 48px var(--wb-accent-shadow),
        inset 0 1px 0 rgba(255,255,255,0.30),
        inset 0 -1px 0 rgba(0,0,0,0.22);
      position: relative;
      animation: wb-float 4.4s ease-in-out infinite;
    }
    .glow-orb svg {
      width: 54px; height: 54px;
      color: #fff;
      animation: wb-spin 14s linear infinite;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.024em;
      color: var(--wb-text);
      margin-bottom: 12px;
      max-width: 340px;
    }
    p.body {
      font-size: 16px;
      color: var(--wb-text-secondary);
      line-height: 1.5;
      margin-bottom: 32px;
      max-width: 360px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 320px;
      min-height: 52px;
      padding: 15px 28px;
      background: linear-gradient(180deg, var(--wb-accent-strong), var(--wb-accent));
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -0.011em;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow:
        0 10px 28px var(--wb-accent-shadow),
        inset 0 1px 0 rgba(255,255,255,0.22);
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(.98); box-shadow: 0 4px 12px var(--wb-accent-shadow-soft); }
    .btn:focus-visible { outline: 2px solid var(--wb-accent-strong); outline-offset: 3px; }
    .btn[disabled] { opacity: .6; pointer-events: none; }

    .hint {
      margin-top: 22px;
      font-size: 13px;
      color: var(--wb-text-muted);
      line-height: 1.45;
      max-width: 320px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .hint svg { width: 14px; height: 14px; opacity: 0.7; flex-shrink: 0; }

    /* RTL */
    [dir="rtl"] body, [dir="rtl"] .btn { letter-spacing: 0; }
    [data-loc="hi"] h1, [data-loc="ar"] h1 { letter-spacing: 0; }

    @keyframes wb-pulse {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50%      { transform: scale(1.20); opacity: 0.92; }
    }
    @keyframes wb-float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }
    @keyframes wb-spin {
      from { transform: rotate(0); }
      to   { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .glow::before, .glow-orb, .glow-orb svg { animation: none !important; }
      .btn { transition: none; }
    }

    @media (max-height: 560px) {
      body { padding-top: 24px; padding-bottom: 24px; }
      .glow { width: 88px; height: 88px; margin-bottom: 22px; }
      .glow-orb { width: 88px; height: 88px; }
      .glow-orb svg { width: 38px; height: 38px; }
      h1 { font-size: 21px; margin-bottom: 8px; }
      p.body { font-size: 14px; margin-bottom: 24px; }
      .btn { min-height: 48px; padding: 13px 24px; font-size: 15px; }
      .hint { margin-top: 16px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <main class="stage" role="alert" aria-live="polite">
    <div class="glow" aria-hidden="true">
      <div class="glow-orb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </div>
    </div>

    <h1 data-i18n="title">Скоро вернёмся</h1>
    <p class="body" data-i18n="body">Мы знаем о проблеме и уже её решаем. Загляни через пару минут — всё снова будет на месте.</p>

    <button type="button" class="btn" data-i18n="retry" onclick="wbRetry(this)">
      <span class="btn-label">Попробовать снова</span>
    </button>

    <p class="hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      <span data-i18n="hint">Как только всё заработает — напишем сюда, в бот.</span>
    </p>
  </main>

  <script>
    (function () {
      var LOCALES = {
        ru: {
          title: 'Скоро вернёмся',
          body:  'Мы знаем о проблеме и уже её решаем. Загляни через пару минут — всё снова будет на месте.',
          retry: 'Попробовать снова',
          hint:  'Как только всё заработает — напишем сюда, в бот.'
        },
        en: {
          title: "We'll be right back",
          body:  "We know about this and we're on it. Check back in a few minutes — everything will be right where you left it.",
          retry: 'Try again',
          hint:  "We'll message you here the moment we're back."
        },
        es: {
          title: 'Volveremos pronto',
          body:  'Sabemos del problema y ya lo estamos resolviendo. Vuelve en unos minutos — todo estará donde lo dejaste.',
          retry: 'Intentar de nuevo',
          hint:  'Te escribiremos aquí en cuanto todo vuelva a funcionar.'
        },
        hi: {
          title: 'हम जल्दी वापस आएंगे',
          body:  'हमें समस्या के बारे में पता है और हम इसे ठीक कर रहे हैं। कुछ मिनट बाद आएं — सब कुछ अपनी जगह पर होगा।',
          retry: 'फिर से प्रयास करें',
          hint:  'जैसे ही सब ठीक होगा — हम आपको यहीं संदेश भेजेंगे।'
        },
        'zh-CN': {
          title: '我们马上回来',
          body:  '我们已经知道问题，正在处理中。几分钟后再来——一切都会回到原位。',
          retry: '重试',
          hint:  '一切恢复后，我们会立刻在这里给您发消息。'
        },
        ar: {
          title: 'سنعود قريباً',
          body:  'نعلم بالأمر ونعمل على حله. عد بعد دقائق — كل شيء سيكون في مكانه.',
          retry: 'حاول مجدداً',
          hint:  'سنراسلك هنا فور عودة كل شيء.'
        }
      };

      function pickLocale() {
        var lang = '';
        try {
          var tg = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe;
          if (tg && tg.user && tg.user.language_code) lang = String(tg.user.language_code);
        } catch (e) {}
        if (!lang) {
          try { lang = navigator.language || (navigator.languages && navigator.languages[0]) || 'ru'; } catch (e) { lang = 'ru'; }
        }
        lang = (lang || '').toLowerCase();
        if (lang.indexOf('zh') === 0) return 'zh-CN';
        if (lang.indexOf('ru') === 0) return 'ru';
        if (lang.indexOf('hi') === 0) return 'hi';
        if (lang.indexOf('es') === 0) return 'es';
        if (lang.indexOf('ar') === 0) return 'ar';
        if (lang.indexOf('en') === 0) return 'en';
        return 'ru';
      }

      var key = pickLocale();
      var dict = LOCALES[key] || LOCALES.ru;
      document.documentElement.lang = key;
      document.documentElement.dir = (key === 'ar') ? 'rtl' : 'ltr';
      document.documentElement.setAttribute('data-loc', key);

      var nodes = document.querySelectorAll('[data-i18n]');
      for (var i = 0; i < nodes.length; i++) {
        var k = nodes[i].getAttribute('data-i18n');
        if (!dict[k]) continue;
        if (k === 'retry') {
          var label = nodes[i].querySelector('.btn-label');
          if (label) label.textContent = dict[k];
          else nodes[i].textContent = dict[k];
        } else {
          nodes[i].textContent = dict[k];
        }
      }
      if (dict.title) document.title = dict.title + ' — WishBoard';

      // Telegram WebView polish
      try {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
          if (window.Telegram.WebApp.setBackgroundColor) window.Telegram.WebApp.setBackgroundColor('#0F0F12');
          if (window.Telegram.WebApp.setHeaderColor)     window.Telegram.WebApp.setHeaderColor('#0F0F12');
        }
      } catch (e) {}

      // Fire-and-forget exposure record so recovery notification reaches this user.
      // At L1 (origin unreachable) this is intercepted by CF Worker (KV buffer).
      // At L2 (nginx 502) this hits the live API → /tg/maintenance-exposure path.
      // keepalive=true ensures the browser sends it even on immediate navigation.
      try {
        var initData = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) || '';
        if (initData) {
          var body = 'initData=' + encodeURIComponent(initData)
                   + '&surface=static'
                   + '&locale='   + encodeURIComponent(key);
          fetch('/__cf-maintenance-exposure', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body,
            keepalive: true,
            credentials: 'omit',
          }).catch(function () { /* silent */ });
        }
      } catch (e) {}
    })();

    function wbRetry(btn) {
      try { btn.setAttribute('disabled', 'true'); } catch (e) {}
      setTimeout(function () { window.location.reload(); }, 120);
    }
  </script>
</body>
</html>
