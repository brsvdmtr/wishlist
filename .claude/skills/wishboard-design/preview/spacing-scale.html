<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--wb-bg);font-family:var(--wb-font-sans);color:var(--wb-text)}
.row{display:flex;align-items:center;gap:14px;padding:4px 0}
.row > .n{width:40px;font-family:ui-monospace,monospace;font-size:11px;color:var(--wb-text-muted)}
.bar{background:var(--wb-accent);height:14px;border-radius:3px}
.lbl{font-size:11px;color:var(--wb-text-secondary)}
.anchor .bar{background:linear-gradient(90deg,#7C6AFF,#9B8AFF)}
.anchor .n{color:var(--wb-text)}
</style></head><body class="wb-dark">
<div class="row"><div class="n">2</div><div class="bar" style="width:8px"></div><div class="lbl">flex gap</div></div>
<div class="row"><div class="n">4</div><div class="bar" style="width:16px"></div><div class="lbl">inline</div></div>
<div class="row anchor"><div class="n">8</div><div class="bar" style="width:32px"></div><div class="lbl"><b>PRIMARY</b> · flex gap between buttons/rows</div></div>
<div class="row"><div class="n">12</div><div class="bar" style="width:48px"></div><div class="lbl">secondary gap</div></div>
<div class="row anchor"><div class="n">14</div><div class="bar" style="width:56px"></div><div class="lbl"><b>ANCHOR</b> · button v-padding · list row gap</div></div>
<div class="row anchor"><div class="n">16</div><div class="bar" style="width:64px"></div><div class="lbl"><b>ANCHOR</b> · card padding · screen padding X</div></div>
<div class="row anchor"><div class="n">24</div><div class="bar" style="width:96px"></div><div class="lbl"><b>ANCHOR</b> · sheet padding · hero spacing</div></div>
<div class="row"><div class="n">32</div><div class="bar" style="width:128px"></div><div class="lbl">large section break</div></div>
</body></html>
