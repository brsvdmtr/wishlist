name = "wishlist-maintenance-worker"
main = "src/index.ts"
compatibility_date = "2026-05-01"
account_id = "2e54560360d0ce9bd32b5079b8f33e3b"

# Routes are SCOPED to paths where the worker actually adds value —
# maintenance fallback for HTML pages, JSON-envelope translation for API
# 5xx, exposure POST + drain endpoints. Static assets (`/_next/*`,
# `/uploads/*`, `/favicon*`) bypass the worker entirely so the cache HIT
# path doesn't pay worker invocation overhead (~30-45 ms per asset
# observed). On a cold Mini App boot with ~30 chunks that's ~1 sec of
# pure savings.
#
# If you ever need to intercept a new path, ADD a route here — do NOT
# regress to `wishlistik.ru/*`.

# Root + Mini App page — for L1 maintenance fallback to fire on
# direct browser navigation.
[[routes]]
pattern = "wishlistik.ru/"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

[[routes]]
pattern = "wishlistik.ru/miniapp*"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

# Public wishlist deep links (`/w/<slug>`).
[[routes]]
pattern = "wishlistik.ru/w/*"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

# API — worker passes through; on origin failure it translates the
# response to a clean JSON envelope so the Mini App can detect maintenance.
[[routes]]
pattern = "wishlistik.ru/api/*"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

# Worker-owned endpoints (`/__cf-maintenance-*`).
[[routes]]
pattern = "wishlistik.ru/__cf-maintenance-*"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

# Mirror to www.wishlistik.ru.
[[routes]]
pattern = "www.wishlistik.ru/"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

[[routes]]
pattern = "www.wishlistik.ru/miniapp*"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

[[routes]]
pattern = "www.wishlistik.ru/w/*"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

[[routes]]
pattern = "www.wishlistik.ru/api/*"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

[[routes]]
pattern = "www.wishlistik.ru/__cf-maintenance-*"
zone_id = "e98ef6854fcc5620f1ac712f9b48c6e0"

# KV namespace for buffering L1 maintenance exposures.
# One-time setup:
#   wrangler kv namespace create MAINTENANCE_EXPOSURES
# Then paste the returned `id` into the line below, replacing the placeholder.
[[kv_namespaces]]
binding = "MAINTENANCE_EXPOSURES"
id = "5f8523bda03e4fa396a239c34c54bc50"

[vars]
# Origin host (for logging / future use). Worker forwards via the original
# request URL by default; the host header survives.
ORIGIN_HOST = "wishlistik.ru"

# Kill switch: set to "1" and redeploy to make the worker a pure pass-through.
# Useful during incident debugging — disables all maintenance handling without
# touching code or unbinding the route.
MAINTENANCE_WORKER_DISABLED = "0"

# Secrets (set via `wrangler secret put <name>`, NOT in this file):
#   BOT_TOKEN       — Telegram bot token, used for initData HMAC verification.
#   CF_DRAIN_SECRET — shared secret with watchdog; guards /__cf-maintenance-drain.

[observability]
enabled = true
head_sampling_rate = 1.0
