name: Deploy to Timeweb

# Auto-deploy on push to main — SSHes from GitHub Actions runner into the
# Wishlist prod VPS and runs git pull + docker rebuild + health check.
# The runner's IP is outside Timeweb's edge-firewall blocklist (unlike a
# developer's home IP), so this works even when a dev is SSH-blocked.
#
# Manual trigger: workflow_dispatch (Actions tab → "Deploy to Timeweb" → Run)
# Concurrency: only one deploy at a time; subsequent pushes queue.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/wishlist
            echo "=== Pull latest ==="
            git fetch origin main
            PREV_SHA=$(git rev-parse HEAD)
            git reset --hard origin/main
            NEW_SHA=$(git rev-parse HEAD)
            git log --oneline -3

            echo "=== Detect changed services ==="
            # Only rebuild images whose source actually changed — rebuilding
            # all three on a 2GB VPS causes transient 502s as containers get
            # recreated under memory pressure. Changed-service list drives
            # both `build` and `up -d`.
            #
            # Path → service mapping:
            #   apps/api/**, packages/db/**, packages/shared/**, pnpm-lock.yaml,
            #   Dockerfile.api   → api
            #   apps/bot/**, packages/db/**, packages/shared/**, pnpm-lock.yaml,
            #   Dockerfile.bot   → bot
            #   apps/web/**, packages/shared/**, pnpm-lock.yaml,
            #   Dockerfile.web   → web
            #   docker-compose.prod.yml → all three (compose spec itself changed)
            #   .github/**              → none (CI-only change)
            CHANGED=$(git diff --name-only "$PREV_SHA" "$NEW_SHA" || echo "")
            echo "Changed files:"
            echo "$CHANGED"

            SERVICES=""
            if echo "$CHANGED" | grep -qE '^docker-compose\.prod\.yml$'; then
              SERVICES="api bot web"
            else
              if echo "$CHANGED" | grep -qE '^(apps/api/|packages/(db|shared)/|pnpm-lock\.yaml$|Dockerfile\.api$)'; then
                SERVICES="$SERVICES api"
              fi
              if echo "$CHANGED" | grep -qE '^(apps/bot/|packages/(db|shared)/|pnpm-lock\.yaml$|Dockerfile\.bot$)'; then
                SERVICES="$SERVICES bot"
              fi
              if echo "$CHANGED" | grep -qE '^(apps/web/|packages/shared/|pnpm-lock\.yaml$|Dockerfile\.web$)'; then
                SERVICES="$SERVICES web"
              fi
            fi

            # Dedupe (packages/db/** matches both api+bot patterns above).
            SERVICES=$(echo "$SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs || true)

            if [ -z "$SERVICES" ]; then
              echo "=== No service-level changes (probably CI/docs-only). Skipping rebuild. ==="
              echo "=== Container status ==="
              docker ps --filter name=wishlist-prod --format '{{.Names}}\t{{.Status}}'
              echo "=== Deploy OK (no-op) ==="
              exit 0
            fi

            echo "=== Rebuilding services: $SERVICES ==="
            # Build sequentially (default) not in parallel — parallel build of
            # 3 Node.js images OOM'd the 2GB VPS, knocking api/web offline
            # for several minutes. Memory limit + serial keeps RAM under
            # 1.5GB during build.
            docker compose -f docker-compose.prod.yml build --memory 768m $SERVICES
            echo "=== Restart changed services with new images ==="
            docker compose -f docker-compose.prod.yml up -d $SERVICES

            echo "=== Wait for services ==="
            sleep 15
            echo "=== Health check ==="
            curl -sf http://localhost:3001/health || { echo "API health check failed"; exit 1; }
            echo "=== Container status ==="
            docker ps --filter name=wishlist-prod --format '{{.Names}}\t{{.Status}}'
            echo "=== Failed migrations (expect 0) ==="
            docker exec wishlist-prod-postgres-1 psql -U wishlist -d wishlist -At -c \
              "SELECT COUNT(*) FROM _prisma_migrations WHERE finished_at IS NULL AND rolled_back_at IS NULL;"
            echo "=== Deploy OK (rebuilt: $SERVICES) ==="
