name: Deploy to Vultr

# Auto-deploy on push to main — SSHes from GitHub Actions runner into the
# Wishlist prod VPS and runs git pull + docker rebuild + health check.
# Production is the Vultr Amsterdam VPS. SSH target is controlled by
# repo secrets, primarily SSH_HOST.
#
# Manual trigger: workflow_dispatch (Actions tab → "Deploy to Vultr" → Run)
# Concurrency: only one deploy at a time; subsequent pushes queue.
#
# Gate: requires the `test` job in tests.yml to pass first — no deploy on
# a red test suite. workflow_dispatch keeps the gate (manual trigger from
# main means tests already ran on the latest push; if you need to skip a
# broken-test deploy in an emergency, run `gh workflow run deploy.yml`
# only after pushing a fix or use `--field skip_tests=true` after wiring
# an input below).
on:
  push:
    branches: [main]
    # Docs-only commits don't need a deploy. The on-server changed-service
    # detection (see `Detect changed services` step below) is the inner
    # defense — it skips the rebuild for docs paths too — but it still
    # spins up the runner and runs the full test suite. Skipping at the
    # workflow level saves CI minutes and avoids needless container
    # recreations for label-only updates.
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'PRODUCTION_READY.md'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # Run the full vitest suite as part of this workflow (re-runs what test.yml
  # also runs on PR — duplicate execution is intentional so deploy can wait
  # on the same job graph it owns rather than cross-workflow dependency).
  tests:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/wishlist
            echo "=== Verify persistent dirs ==="
            # /opt/wishlist/web-chunks must exist with uid 1001 ownership
            # so the web container's entrypoint can rsync image-baked
            # chunks into it (see docker-compose.prod.yml web.volumes,
            # ops/web-entrypoint.sh, docs/BUGFIX_LESSONS.md 2026-05-27).
            # First-time host setup is a manual one-liner per CLAUDE.md
            # (run once: sudo mkdir -p /opt/wishlist/web-chunks &&
            #            sudo chown -R 1001:1001 /opt/wishlist/web-chunks).
            # The deploy script doesn't `sudo` because we can't assume
            # the SSH user has passwordless sudo. If the dir is missing,
            # fail fast with a clear message rather than letting docker
            # silently create a root-owned mount the container can't
            # write to.
            if [ ! -d /opt/wishlist/web-chunks ]; then
              echo "ERROR: /opt/wishlist/web-chunks does not exist."
              echo "Run on host (one-time): sudo mkdir -p /opt/wishlist/web-chunks && sudo chown -R 1001:1001 /opt/wishlist/web-chunks"
              exit 1
            fi
            OWNER=$(stat -c '%u' /opt/wishlist/web-chunks 2>/dev/null || stat -f '%u' /opt/wishlist/web-chunks 2>/dev/null || echo "?")
            if [ "$OWNER" != "1001" ]; then
              echo "WARNING: /opt/wishlist/web-chunks is owned by uid=$OWNER, expected 1001 — container may fail to write chunks."
              echo "Fix on host: sudo chown -R 1001:1001 /opt/wishlist/web-chunks"
            fi
            echo "=== Pull latest ==="
            git fetch origin main

            # PREV_SHA is the changed-service-detection baseline: it must be the
            # last *successfully deployed* commit. Do NOT read it from
            # `git rev-parse HEAD` — the `git reset --hard origin/main` below
            # advances HEAD *before* the build runs, so a deploy that fails
            # mid-build (e.g. a transient `next build` font-fetch timeout)
            # leaves HEAD already at the new SHA. On the retry, `git diff
            # HEAD..origin/main` is empty, the detection finds no changed
            # services, and the rebuild is silently skipped while CI reports
            # success (the stale image keeps running). Source it instead from
            # the .deploy/last-successful-release marker — the same file
            # ops/deploy.sh writes and ops/rollback.sh reads — which is updated
            # only after a deploy fully succeeds. The marker is untracked
            # per-host runtime state (not version-controlled): `git reset
            # --hard` leaves it alone, and `.deploy/` is gitignored so the
            # `git clean -fd` in ops/rollback.sh skips it too. If it is lost
            # anyway — first deploy on a fresh host, manual deletion, a
            # `git clean -x` — the missing-marker path below just forces a
            # harmless full rebuild. Worst case the marker is
            # stale (points further back than reality): the diff range is then
            # too wide and over-rebuilds — slower, but never under-rebuilds.
            # That asymmetry is deliberate — an over-rebuild is safe, a skipped
            # rebuild is the bug this fix exists to prevent.
            DEPLOY_DIR=/opt/wishlist/.deploy
            RELEASE_MARKER="$DEPLOY_DIR/last-successful-release"
            mkdir -p "$DEPLOY_DIR"
            PREV_SHA=""
            if [ -f "$RELEASE_MARKER" ]; then
              # `[:space:]` is a tr character class — this strips the trailing
              # newline echo wrote plus any stray whitespace. Do not "simplify"
              # to `tr -d '\n'`: a hand-edited marker may carry other blanks.
              PREV_SHA=$(tr -d '[:space:]' < "$RELEASE_MARKER")
            fi
            if [ -n "$PREV_SHA" ] && git rev-parse --verify --quiet "${PREV_SHA}^{commit}" >/dev/null; then
              echo "PREV_SHA from release marker: $PREV_SHA"
            else
              # First deploy on this host, or the marker was lost/corrupt.
              # Do NOT fall back to `git rev-parse HEAD`: the `git reset --hard`
              # below advances HEAD before the build, so on a retry-after-
              # failure a HEAD baseline would diff an empty range and skip the
              # rebuild — the exact bug this marker prevents. Leave PREV_SHA
              # empty as a sentinel; the change-detection below treats an empty
              # baseline as "rebuild everything". Over-rebuilding is always
              # safe; under-rebuilding is the bug.
              PREV_SHA=""
              echo "release marker missing/invalid — forcing a full rebuild"
            fi

            git reset --hard origin/main
            NEW_SHA=$(git rev-parse HEAD)
            git log --oneline -3

            echo "=== Update APP_RELEASE in .env to current short HEAD ==="
            # /opt/wishlist/.env was historically pinned by hand and drifted
            # away from the deployed SHA after every code push. The compose
            # spec already reads APP_RELEASE via ${APP_RELEASE:-unknown};
            # bumping the .env line here is enough — no compose-spec change.
            # The /api/health response surfaces this via process.env.APP_RELEASE.
            SHORT_SHA=$(git rev-parse --short HEAD)
            if [ -f .env ] && grep -q '^APP_RELEASE=' .env; then
              sed -i "s/^APP_RELEASE=.*/APP_RELEASE=$SHORT_SHA/" .env
              echo "APP_RELEASE -> $SHORT_SHA"
            else
              echo "APP_RELEASE: .env or APP_RELEASE= line missing — skipping bump"
            fi

            echo "=== Detect changed services ==="
            # Only rebuild images whose source actually changed — rebuilding
            # all three on a 2GB VPS causes transient 502s as containers get
            # recreated under memory pressure. Changed-service list drives
            # both `build` and `up -d`.
            #
            # Path → service mapping (mirrors workspace deps in apps/*/package.json):
            #   apps/api/**, packages/db/**, packages/shared/**, pnpm-lock.yaml,
            #   Dockerfile.api   → api
            #   apps/bot/**, packages/db/**, packages/shared/**, pnpm-lock.yaml,
            #   Dockerfile.bot   → bot
            #   apps/web/**, packages/shared/**, packages/ui/**, packages/ui-tokens/**,
            #   pnpm-lock.yaml, Dockerfile.web, ops/web-entrypoint.sh → web
            #     (ui + ui-tokens are transpilePackages in next.config.mjs —
            #      Next compiles their TS source at build time, so changes must
            #      trigger a web rebuild even though they're separate packages.
            #      ops/web-entrypoint.sh is COPYed by Dockerfile.web.)
            #   docker-compose.prod.yml → all three (compose spec itself changed)
            #   .github/**              → none (CI-only change)
            # A marker SHA that isn't an ancestor of NEW_SHA is also untrust-
            # worthy: `ops/deploy.sh` writes the marker from its own checkout
            # without fetch/reset, so an operator running it from a side
            # branch could leave a SHA off the origin/main line. `git diff`
            # between unrelated commits still yields a (misleading) delta —
            # discard such a baseline and fall through to a full rebuild.
            if [ -n "$PREV_SHA" ] && ! git merge-base --is-ancestor "$PREV_SHA" "$NEW_SHA" 2>/dev/null; then
              echo "marker SHA $PREV_SHA is not an ancestor of $NEW_SHA — forcing a full rebuild"
              PREV_SHA=""
            fi
            if [ -z "$PREV_SHA" ]; then
              # No trustworthy baseline (see marker logic above) — a diff would
              # be meaningless. Fall through to a full rebuild.
              CHANGED=""
            else
              CHANGED=$(git diff --name-only "$PREV_SHA" "$NEW_SHA" || echo "")
            fi
            echo "Changed files:"
            echo "$CHANGED"

            SERVICES=""
            if [ -z "$PREV_SHA" ] || echo "$CHANGED" | grep -qE '^docker-compose\.prod\.yml$'; then
              SERVICES="api bot web"
            else
              if echo "$CHANGED" | grep -qE '^(apps/api/|packages/(db|shared)/|pnpm-lock\.yaml$|Dockerfile\.api$)'; then
                SERVICES="$SERVICES api"
              fi
              if echo "$CHANGED" | grep -qE '^(apps/bot/|packages/(db|shared)/|pnpm-lock\.yaml$|Dockerfile\.bot$)'; then
                SERVICES="$SERVICES bot"
              fi
              if echo "$CHANGED" | grep -qE '^(apps/web/|packages/(shared|ui|ui-tokens)/|pnpm-lock\.yaml$|Dockerfile\.web$|ops/web-entrypoint\.sh$)'; then
                SERVICES="$SERVICES web"
              fi
            fi

            # Dedupe (packages/db/** matches both api+bot patterns above).
            SERVICES=$(echo "$SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs || true)

            if [ -z "$SERVICES" ]; then
              echo "=== No service-level changes (probably CI/docs-only). Recreating api+bot to pick up new APP_RELEASE label. ==="
              # No-build recreate so the env-var bump above propagates into
              # the running containers without paying for an image rebuild.
              # Compose detects the env change and replaces the containers;
              # if APP_RELEASE was already correct (e.g. retry of same HEAD)
              # this is a no-op.
              docker compose -f docker-compose.prod.yml up -d --no-build api bot
              echo "=== Container status ==="
              docker ps --filter name=wishlist-prod --format '{{.Names}}\t{{.Status}}'
              # Record success: this run deployed NEW_SHA (nothing to rebuild).
              # No health gate here — unlike the rebuild branch — by design:
              # this branch ships no new image, api/bot keep their already-
              # proven images and only the APP_RELEASE label changes. `set -e`
              # still aborts before this line if the `up -d` recreate fails.
              echo "$NEW_SHA" > "$RELEASE_MARKER"
              echo "=== Deploy OK (label refresh, no rebuild) ==="
              exit 0
            fi

            echo "=== Rebuilding services: $SERVICES ==="
            # Build sequentially (default) not in parallel — parallel build of
            # 3 Node.js images OOM'd the 2GB VPS, knocking api/web offline
            # for several minutes. Memory limit + serial keeps RAM under
            # 1.5GB during build.
            docker compose -f docker-compose.prod.yml build --memory 768m $SERVICES
            echo "=== Restart changed services with new images ==="
            docker compose -f docker-compose.prod.yml up -d $SERVICES

            echo "=== Wait for services ==="
            sleep 15
            echo "=== Health check ==="
            curl -sf http://localhost:3001/health || { echo "API health check failed"; exit 1; }
            echo "=== Container status ==="
            docker ps --filter name=wishlist-prod --format '{{.Names}}\t{{.Status}}'
            echo "=== Failed migrations (expect 0) ==="
            FAILED_MIGRATIONS=$(docker exec wishlist-prod-postgres-1 psql -U wishlist -d wishlist -At -c \
              "SELECT COUNT(*) FROM _prisma_migrations WHERE finished_at IS NULL AND rolled_back_at IS NULL;")
            echo "$FAILED_MIGRATIONS unfinished migration(s)"
            if [ "$FAILED_MIGRATIONS" != "0" ]; then
              # A stuck migration means the deploy is NOT fully healthy — fail
              # the job and do not advance the marker, so this release is not
              # recorded as the last-known-good baseline.
              echo "ERROR: $FAILED_MIGRATIONS unfinished migration(s) — see CLAUDE.md for 'prisma migrate resolve'"
              exit 1
            fi
            # Record success: build + restart + health check + migrations all OK.
            # Written last so a failure above never updates the baseline —
            # this is what makes a retry-after-failure rebuild correctly.
            echo "$NEW_SHA" > "$RELEASE_MARKER"
            echo "=== Deploy OK (rebuilt: $SERVICES) ==="
