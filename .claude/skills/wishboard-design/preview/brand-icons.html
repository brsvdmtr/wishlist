<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--wb-bg);font-family:var(--wb-font-sans);color:var(--wb-text)}
.group{margin-bottom:14px}
.group h4{margin:0 0 8px;font-size:10px;color:#6B7280;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.row{display:flex;gap:10px;flex-wrap:wrap}
.thumb{width:52px;height:52px;border-radius:14px;background:rgba(124,106,255,0.12);display:flex;align-items:center;justify-content:center;font-size:26px}
.thumb.warm{background:rgba(251,191,36,0.12)}
.thumb.green{background:rgba(52,211,153,0.12)}
.thumb.rose{background:rgba(240,78,110,0.15)}
.inline{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
.inline + .inline{margin-top:6px}
.glyph{font-size:20px;color:#6B7280;width:22px;text-align:center;font-family:ui-monospace,monospace}
</style></head><body class="wb-dark">
<div class="group"><h4>Thumbnail emoji (52 px, soft-color bg)</h4><div class="row">
  <div class="thumb">🎧</div><div class="thumb warm">☕</div><div class="thumb green">👟</div><div class="thumb rose">💍</div>
  <div class="thumb">📱</div><div class="thumb warm">📚</div><div class="thumb green">🧸</div><div class="thumb">🎮</div>
</div></div>
<div class="group"><h4>Section-header prefix</h4>
  <div class="inline">🎁 Мои вишлисты</div>
  <div class="inline">🤝 Активные брони</div>
  <div class="inline">🎄 Secret Santa</div>
  <div class="inline">⭐ Telegram Stars</div>
</div>
<div class="group"><h4>Unicode glyphs (inline utility)</h4>
  <div class="row" style="align-items:center"><span class="glyph">›</span><span style="color:#9CA3AF;font-size:12px">trailing chevron</span>
  <span class="glyph">·</span><span style="color:#9CA3AF;font-size:12px">meta separator</span>
  <span class="glyph">×</span><span style="color:#9CA3AF;font-size:12px">close</span>
  <span class="glyph">+</span><span style="color:#9CA3AF;font-size:12px">add</span></div>
</div>
</body></html>
