name: Tests

# Runs vitest across the monorepo on every PR and push to main.
# Required for merge — see `deploy.yml`, which has `needs: test`.
#
# Strategy:
#   - GitHub Actions postgres:16-alpine service container provides a real DB
#     for integration tests in apps/api (Prisma queries, route handlers,
#     schedulers). Phase 0–1 tests are pure-unit and don't need it, but the
#     service is wired up now so Phase 2+ doesn't require touching CI.
#   - DATABASE_URL is exported for all steps; apps/api integration tests
#     read it from process.env.
#   - prisma migrate deploy runs once before tests, establishing the schema.

on:
  pull_request:
  # Allow deploy.yml (and other workflows) to invoke this as a gate via
  # `uses: ./.github/workflows/test.yml`. The push-to-main trigger lives
  # in deploy.yml's `tests` job — running it independently here would
  # double-execute every merge for no extra signal.
  workflow_call:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wishlist
          POSTGRES_PASSWORD: wishlist
          POSTGRES_DB: wishlist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wishlist -d wishlist_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://wishlist:wishlist@localhost:5432/wishlist_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Must match `packageManager` in root package.json so CI and the
          # corepack-aware Docker builds resolve the same pnpm version. A
          # drift here means the test gate runs against a different binary
          # than what ships to prod.
          version: 10.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # @prisma/client postinstall can't find the schema (it sits in
        # packages/db/prisma/) so we must run generate explicitly. Otherwise
        # tsc against db/api code can't resolve `Prisma.JsonValue`, the
        # generated `ReferralAttribution` types, etc.
        run: pnpm -C packages/db db:generate

      - name: Build shared package
        # packages/db imports from `@wishlist/shared`; without the build,
        # tsc fails to resolve module types. Must precede db build.
        run: pnpm -C packages/shared build

      - name: Build db package
        run: pnpm -C packages/db build

      - name: Apply Prisma schema (db push, not migrate deploy)
        # `migrate deploy` replays all 84 migrations in order from a fresh DB,
        # which collides on enum-add operations whose values are already in
        # the init migration's snapshot (e.g. ItemStatus.COMPLETED). Prod uses
        # incremental migrate-deploy historically; that path doesn't collide
        # because prod never re-applies the init from scratch.
        #
        # For the CI test gate we just want the current schema shape — not
        # to validate the migration history. `db push` from schema.prisma is
        # the canonical Prisma command for fresh-DB-from-schema and bypasses
        # the historical replay problem entirely.
        run: pnpm -C packages/db exec prisma db push --schema=prisma/schema.prisma --skip-generate --accept-data-loss

      - name: Run tests
        run: pnpm test

      - name: Run ops tests (node:test for ops/*.test.mjs)
        # `pnpm test` is workspace-recursive (`pnpm -r ... run test`) and does
        # NOT see the root-level node:test invocation. Without this step the
        # ops node:test suites (watchdog state machine + deploy-workflow
        # guards) would pass on `pnpm test:ops` locally but never block CI,
        # defeating the test gate. Added 2026-05-17 (watchdog-hardening PR);
        # deploy-workflow guards added 2026-05-20.
        run: pnpm test:ops

      - name: Coverage report (non-blocking)
        if: always()
        run: pnpm test:coverage || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/*/coverage/
            packages/*/coverage/
          retention-days: 7
