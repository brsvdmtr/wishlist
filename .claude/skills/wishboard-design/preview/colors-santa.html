<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--wb-bg);font-family:var(--wb-font-sans)}
.row{display:grid;grid-template-columns:1fr 1fr 1fr 2fr;gap:10px}
.sw{aspect-ratio:1.3;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
.n{font-size:12px;font-weight:700}
.h{font-size:10px;opacity:.8;font-family:ui-monospace,monospace;margin-top:2px}
.hero{aspect-ratio:2.6;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;letter-spacing:-.01em;font-size:15px;
  background:radial-gradient(ellipse at top right, rgba(255,255,255,0.12), transparent 55%), linear-gradient(135deg, #0f5f3c 0%, #1a8552 60%, #d92020 130%)}
</style></head><body class="wb-dark">
<div class="row">
<div class="sw" style="background:#0f5f3c"><div class="n">green-dark</div><div class="h">#0f5f3c</div></div>
<div class="sw" style="background:#1a8552"><div class="n">green</div><div class="h">#1a8552</div></div>
<div class="sw" style="background:#d92020"><div class="n">red</div><div class="h">#d92020</div></div>
<div class="hero">🎄 Secret Santa hero gradient</div>
</div>
</body></html>
