name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_HOST:-}" ] || [ -z "${SSH_USER:-}" ] || [ -z "${SSH_PORT:-}" ] || [ -z "${SSH_PRIVATE_KEY:-}" ] || [ -z "${DEPLOY_PATH:-}" ]; then
            echo "Missing required SSH secrets (SSH_HOST/SSH_USER/SSH_PORT/SSH_PRIVATE_KEY/DEPLOY_PATH)." >&2
            exit 1
          fi

          eval "$(ssh-agent -s)" >/dev/null
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - >/dev/null

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<REMOTE
          set -euo pipefail

          cd "$DEPLOY_PATH"

          git fetch origin
          git reset --hard origin/main

          # Pull if using a registry (optional), then build & start
          docker compose -f docker-compose.prod.yml pull || true
          docker compose -f docker-compose.prod.yml up -d --build

          # Apply migrations
          docker compose -f docker-compose.prod.yml exec -T web npm run prisma:deploy
          REMOTE

      - name: Healthcheck
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_URL:-}" ]; then
            echo "Missing BASE_URL secret (example: https://wishlist.example.com)." >&2
            exit 1
          fi

          url="${BASE_URL%/}/health"
          echo "Checking: $url"

          for i in {1..30}; do
            if curl -fsS "$url" | grep -q '"ok":true'; then
              echo "Healthcheck OK"
              exit 0
            fi
            sleep 2
          done

          echo "Healthcheck failed" >&2
          exit 1
