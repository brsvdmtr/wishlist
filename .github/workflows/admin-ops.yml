name: Admin Ops

# Manual operations on the WishBoard prod Vultr VPS — trigger from the Actions
# tab (or `gh workflow run admin-ops.yml -f action=<...>`). Designed for
# situations where the developer IP cannot SSH directly, but any ops action
# also works fine when SSH works.
#
# Why a workflow instead of one-off curl? Actions runners have a stable,
# broad IP pool into the VPS, and every run is audit-logged — so
# "delete test user" or "run SQL" leaves a trace with who/when/what.
#
# SECURITY: only repo admins can workflow_dispatch. The shell/SQL actions
# run as root on prod — treat them like a live psql session.
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          # Referral-specific
          - bump-rollout
          - heal-attribution
          - reset-test-data
          - retest-reset
          - funnel-snapshot
          # General ops
          - tail-logs
          - run-sql
          - exec-shell
          - container-status
          - health-check
          - restart-service
          - resolve-migration
          - edit-env-var
          - download-file
          - upload-file
          - watch-logs
      # Referral inputs
      rollout_percent:
        description: '[bump-rollout] Rollout percent (0–100)'
        required: false
        default: '100'
        type: string
      attribution_id:
        description: '[heal-attribution] Attribution id'
        required: false
        type: string
      test_user_telegram_id:
        description: '[reset-test-data / retest-reset] Test user telegramId'
        required: false
        default: '8747175307'
        type: string
      inviter_user_id:
        description: '[retest-reset] Inviter User.id (rolls back their PRO bonus)'
        required: false
        default: 'cmlpsrf4e0000ikxja0lu9tuz'
        type: string
      # Logs
      log_service:
        description: '[tail-logs] Container: api / bot / web / postgres'
        required: false
        default: 'api'
        type: choice
        options:
          - api
          - bot
          - web
          - postgres
      log_lines:
        description: '[tail-logs] Number of lines'
        required: false
        default: '100'
        type: string
      log_grep:
        description: '[tail-logs] Optional grep pattern (egrep, pre-tail)'
        required: false
        default: ''
        type: string
      # Free-form SQL (runs on the wishlist database)
      sql_query:
        description: '[run-sql] SQL query — runs as-is via docker exec psql. Wrap in SELECT for safety.'
        required: false
        default: ''
        type: string
      # Free-form shell (runs on the VPS as root)
      shell_command:
        description: '[exec-shell] Bash command — runs as root on the VPS. Escapes $ as \\$.'
        required: false
        default: ''
        type: string
      # Restart a specific container without rebuild
      restart_target:
        description: '[restart-service] Container to restart (no rebuild)'
        required: false
        default: 'api'
        type: choice
        options:
          - api
          - bot
          - web
      # Prisma: resolve a failed migration by marking it applied
      migration_name:
        description: '[resolve-migration] Migration dir name (e.g. 20260425000000_add_referral_program)'
        required: false
        default: ''
        type: string
      # .env editor
      env_key:
        description: '[edit-env-var] Name of env var in /opt/wishlist/.env'
        required: false
        default: ''
        type: string
      env_value:
        description: '[edit-env-var] New value (leave blank to delete the var)'
        required: false
        default: ''
        type: string
      # File ops
      file_path:
        description: '[download-file / upload-file] Absolute path on server (e.g. /opt/wishlist/.env)'
        required: false
        default: ''
        type: string
      file_content_b64:
        description: '[upload-file] Base64-encoded file content'
        required: false
        default: ''
        type: string
      # Live log follow (time-capped)
      watch_duration_sec:
        description: '[watch-logs] How long to stream (seconds, max 300)'
        required: false
        default: '60'
        type: string

concurrency:
  group: admin-ops
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Execute admin action over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ACTION: ${{ inputs.action }}
          ROLLOUT: ${{ inputs.rollout_percent }}
          ATTR_ID: ${{ inputs.attribution_id }}
          TEST_TGID: ${{ inputs.test_user_telegram_id }}
          INVITER_ID: ${{ inputs.inviter_user_id }}
          LOG_SVC: ${{ inputs.log_service }}
          LOG_LINES: ${{ inputs.log_lines }}
          LOG_GREP: ${{ inputs.log_grep }}
          SQL_QUERY: ${{ inputs.sql_query }}
          SHELL_CMD: ${{ inputs.shell_command }}
          RESTART_TARGET: ${{ inputs.restart_target }}
          MIGRATION_NAME: ${{ inputs.migration_name }}
          ENV_KEY: ${{ inputs.env_key }}
          ENV_VALUE: ${{ inputs.env_value }}
          FILE_PATH: ${{ inputs.file_path }}
          FILE_CONTENT_B64: ${{ inputs.file_content_b64 }}
          WATCH_DURATION: ${{ inputs.watch_duration_sec }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: ACTION,ROLLOUT,ATTR_ID,TEST_TGID,INVITER_ID,LOG_SVC,LOG_LINES,LOG_GREP,SQL_QUERY,SHELL_CMD,RESTART_TARGET,MIGRATION_NAME,ENV_KEY,ENV_VALUE,FILE_PATH,FILE_CONTENT_B64,WATCH_DURATION
          script: |
            set -euo pipefail
            source /opt/wishlist/.env
            PSQL="docker exec wishlist-prod-postgres-1 psql -U wishlist -d wishlist"
            API="http://localhost:3001"

            case "$ACTION" in

              bump-rollout)
                echo "=== PATCH rolloutPercent → ${ROLLOUT}% ==="
                curl -sf -X PATCH \
                  -H "X-ADMIN-KEY: $ADMIN_KEY" \
                  -H "Content-Type: application/json" \
                  "$API/admin/referral/config" \
                  -d "{\"rolloutPercent\":${ROLLOUT},\"updatedByAdminId\":\"github-actions\"}" \
                  | head -c 400
                echo
                ;;

              heal-attribution)
                if [ -z "$ATTR_ID" ]; then echo "ERROR: attribution_id input is required"; exit 1; fi
                echo "=== Current attribution state ==="
                $PSQL -c "SELECT id, status, \"rejectReason\", \"invitedUserId\" FROM \"ReferralAttribution\" WHERE id='${ATTR_ID}';"
                echo "=== Mark all milestones for invitee (idempotent) ==="
                $PSQL -c "UPDATE \"UserProfile\" SET \"firstBotStartAt\" = COALESCE(\"firstBotStartAt\", NOW()), \"firstWishlistAt\" = COALESCE(\"firstWishlistAt\", NOW()), \"firstItemAt\" = COALESCE(\"firstItemAt\", NOW()) WHERE \"userId\" = (SELECT \"invitedUserId\" FROM \"ReferralAttribution\" WHERE id='${ATTR_ID}') RETURNING \"firstBotStartAt\", \"firstWishlistAt\", \"firstItemAt\";"
                echo "=== Retry qualify + reward ==="
                curl -sf -X POST -H "X-ADMIN-KEY: $ADMIN_KEY" "$API/admin/referral/attribution/${ATTR_ID}/retry-qualify"
                echo
                ;;

              reset-test-data)
                if [ -z "$TEST_TGID" ]; then echo "ERROR: test_user_telegram_id input is required"; exit 1; fi
                echo "=== Delete test user (CASCADE removes attribution) ==="
                $PSQL -c "DELETE FROM \"User\" WHERE \"telegramId\" = '${TEST_TGID}' RETURNING id;"
                $PSQL -c "SELECT COUNT(*) AS remaining FROM \"User\" WHERE \"telegramId\" = '${TEST_TGID}';"
                ;;

              retest-reset)
                if [ -z "$TEST_TGID" ] || [ -z "$INVITER_ID" ]; then echo "ERROR: test_user_telegram_id + inviter_user_id required"; exit 1; fi
                echo "=== Delete test user ==="
                $PSQL -c "DELETE FROM \"User\" WHERE \"telegramId\" = '${TEST_TGID}' RETURNING id, \"telegramId\";"
                echo "=== Delete latest reward to this inviter ==="
                $PSQL -c "DELETE FROM \"ReferralReward\" WHERE id = (SELECT id FROM \"ReferralReward\" WHERE \"userId\" = '${INVITER_ID}' ORDER BY \"grantedAt\" DESC LIMIT 1) RETURNING id, \"rewardValueDays\", \"grantedAt\";"
                echo "=== Roll back inviter's PRO by 30 days (if currently extended) ==="
                $PSQL -c "UPDATE \"Subscription\" SET \"currentPeriodEnd\" = \"currentPeriodEnd\" - INTERVAL '30 days' WHERE \"userId\" = '${INVITER_ID}' AND \"planCode\" = 'PRO' AND \"currentPeriodEnd\" > NOW() RETURNING id, \"currentPeriodEnd\";"
                echo "=== Remaining attributions for inviter ==="
                $PSQL -c "SELECT COUNT(*) FROM \"ReferralAttribution\" WHERE \"inviterUserId\" = '${INVITER_ID}';"
                ;;

              funnel-snapshot)
                echo "=== Referral funnel (last 30d) ==="
                curl -sf -H "X-ADMIN-KEY: $ADMIN_KEY" "$API/admin/referral/funnel" | head -c 2000
                echo
                echo "=== Current config ==="
                curl -sf -H "X-ADMIN-KEY: $ADMIN_KEY" "$API/admin/referral/config" | head -c 2000
                echo
                ;;

              tail-logs)
                # -L = follow links, but docker compose logs already outputs; we want a non-tail snapshot.
                # No --follow → single shot.
                CONTAINER="wishlist-prod-${LOG_SVC}-1"
                echo "=== Last ${LOG_LINES} lines of ${CONTAINER} ==="
                if [ -n "$LOG_GREP" ]; then
                  # Pull a wider window then grep; gives us matched lines even if recent ones don't match.
                  docker logs --tail "$(( LOG_LINES * 5 ))" "$CONTAINER" 2>&1 | grep -E "$LOG_GREP" | tail -n "$LOG_LINES" || true
                else
                  docker logs --tail "$LOG_LINES" "$CONTAINER" 2>&1 || true
                fi
                ;;

              run-sql)
                if [ -z "$SQL_QUERY" ]; then echo "ERROR: sql_query input is required"; exit 1; fi
                echo "=== SQL (as root on wishlist DB) ==="
                echo "Query: $SQL_QUERY"
                echo "---"
                $PSQL -c "$SQL_QUERY"
                ;;

              exec-shell)
                if [ -z "$SHELL_CMD" ]; then echo "ERROR: shell_command input is required"; exit 1; fi
                echo "=== Shell (as root on VPS) ==="
                echo "Command: $SHELL_CMD"
                echo "---"
                eval "$SHELL_CMD"
                ;;

              container-status)
                echo "=== Containers ==="
                docker ps --filter name=wishlist-prod --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
                echo "=== Uptime / load ==="
                uptime
                echo "=== Disk ==="
                df -h / | tail -1
                echo "=== Memory ==="
                free -h | head -3
                ;;

              health-check)
                # Post-deploy 6-point health check from CLAUDE.md. Run this after
                # any risky change to catch regressions that show up only under
                # real-traffic conditions.
                echo "=== 1. Failed migrations (expect 0 rows) ==="
                $PSQL -c "SELECT migration_name FROM _prisma_migrations WHERE finished_at IS NULL AND rolled_back_at IS NULL;"
                echo "=== 2. API /health ==="
                curl -sf "$API/health" && echo
                echo "=== 3. Containers ==="
                docker ps --filter name=wishlist-prod --format '{{.Names}} {{.Status}}'
                echo "=== 4. Bot heartbeat (updatedAt should be recent) ==="
                $PSQL -c "SELECT * FROM \"ServiceHeartbeat\" ORDER BY \"updatedAt\" DESC LIMIT 1;"
                echo "=== 5. Last lifecycle touch (should be < 2 days ago) ==="
                $PSQL -c "SELECT MAX(\"sentAt\") as last_lifecycle_touch FROM \"LifecycleTouch\";"
                echo "=== 6. Error events spike (last 24h) ==="
                $PSQL -c "SELECT event, COUNT(*) FROM \"AnalyticsEvent\" WHERE event LIKE 'error:%' AND \"createdAt\" >= NOW() - INTERVAL '1 day' GROUP BY event ORDER BY count DESC;"
                ;;

              restart-service)
                # Restart a single container WITHOUT rebuilding the image. Useful
                # when you just need a fresh process (env var edit, Telegram API
                # reconnect after IPv6 blip, in-memory cache reset) without the
                # 3-5 min cost of a full rebuild deploy.
                if [ -z "$RESTART_TARGET" ]; then echo "ERROR: restart_target input is required"; exit 1; fi
                CONTAINER="wishlist-prod-${RESTART_TARGET}-1"
                echo "=== Restart ${CONTAINER} ==="
                docker restart "$CONTAINER"
                sleep 5
                docker ps --filter "name=${CONTAINER}" --format '{{.Names}} {{.Status}}'
                ;;

              resolve-migration)
                # Marks a failed migration as applied. Use when a migration
                # errored mid-apply (disk full / OOM during CREATE INDEX) but
                # you've manually confirmed the schema is correct. CLAUDE.md
                # references this exact command for post-deploy recovery.
                if [ -z "$MIGRATION_NAME" ]; then echo "ERROR: migration_name input is required"; exit 1; fi
                echo "=== Resolve migration: ${MIGRATION_NAME} ==="
                docker exec wishlist-prod-api-1 /app/packages/db/node_modules/.bin/prisma migrate resolve \
                  --applied "${MIGRATION_NAME}" \
                  --schema=/app/packages/db/prisma/schema.prisma
                echo "=== Post-resolve: failed migrations (expect 0) ==="
                $PSQL -c "SELECT migration_name FROM _prisma_migrations WHERE finished_at IS NULL AND rolled_back_at IS NULL;"
                ;;

              edit-env-var)
                # Non-interactive editor for /opt/wishlist/.env. Idempotent:
                # replaces existing line matching KEY=... or appends if absent.
                # Empty value deletes the line. Requires container restart to
                # pick up the change — remind the operator in the output.
                if [ -z "$ENV_KEY" ]; then echo "ERROR: env_key input is required"; exit 1; fi
                ENV_FILE="/opt/wishlist/.env"
                # Shell escape for use in sed replacement
                ESCAPED=$(printf '%s\n' "$ENV_VALUE" | sed -e 's/[\/&]/\\&/g')
                if [ -z "$ENV_VALUE" ]; then
                  echo "=== Delete ${ENV_KEY} from .env ==="
                  sed -i.bak "/^${ENV_KEY}=/d" "$ENV_FILE"
                else
                  echo "=== Set ${ENV_KEY}=<value> in .env ==="
                  if grep -q "^${ENV_KEY}=" "$ENV_FILE"; then
                    sed -i.bak "s/^${ENV_KEY}=.*/${ENV_KEY}=${ESCAPED}/" "$ENV_FILE"
                  else
                    echo "${ENV_KEY}=${ENV_VALUE}" >> "$ENV_FILE"
                  fi
                fi
                echo "=== Current value (tail) ==="
                grep "^${ENV_KEY}=" "$ENV_FILE" | sed 's/=.*/=***/' || echo "(not set)"
                echo "=== IMPORTANT: restart affected containers to pick up the change ==="
                echo "Run admin-ops again with action=restart-service + restart_target=<api|bot|web>"
                ;;

              download-file)
                # Read ANY file from the server. Output is base64 for safety
                # (binary-clean, newline-safe, quote-safe). Decode with
                # `base64 -d` locally. Prints size + path + content markers
                # for easy parsing in workflow logs.
                if [ -z "$FILE_PATH" ]; then echo "ERROR: file_path input is required"; exit 1; fi
                if [ ! -f "$FILE_PATH" ] && [ ! -L "$FILE_PATH" ]; then
                  echo "ERROR: File not found: $FILE_PATH"
                  exit 1
                fi
                SIZE=$(stat -c%s "$FILE_PATH" 2>/dev/null || wc -c <"$FILE_PATH")
                echo "=== File: $FILE_PATH ($SIZE bytes) ==="
                echo "=== BEGIN BASE64 ==="
                base64 -w 0 "$FILE_PATH"
                echo
                echo "=== END BASE64 ==="
                # Also show head if it looks like text (first 512 bytes, printable)
                if file -b "$FILE_PATH" | grep -qE 'text|ASCII|UTF-8|JSON'; then
                  echo "=== Preview (first 40 lines) ==="
                  head -40 "$FILE_PATH"
                fi
                ;;

              upload-file)
                # Write an arbitrary file onto the server. Content is passed
                # base64-encoded for safety (binary-clean, newline-safe).
                # Creates parent dir if missing. Preserves mode 0644.
                if [ -z "$FILE_PATH" ]; then echo "ERROR: file_path input is required"; exit 1; fi
                if [ -z "$FILE_CONTENT_B64" ]; then echo "ERROR: file_content_b64 input is required"; exit 1; fi
                DIR=$(dirname "$FILE_PATH")
                mkdir -p "$DIR"
                # Backup if file exists
                if [ -f "$FILE_PATH" ]; then
                  cp "$FILE_PATH" "${FILE_PATH}.bak.$(date +%s)"
                  echo "=== Backed up existing file to ${FILE_PATH}.bak.<ts> ==="
                fi
                # Decode + write atomically via temp file
                TMP=$(mktemp)
                echo "$FILE_CONTENT_B64" | base64 -d > "$TMP"
                mv "$TMP" "$FILE_PATH"
                chmod 0644 "$FILE_PATH"
                SIZE=$(stat -c%s "$FILE_PATH")
                echo "=== Wrote $SIZE bytes to $FILE_PATH ==="
                echo "=== Preview (first 20 lines) ==="
                head -20 "$FILE_PATH" 2>/dev/null || echo "(binary file)"
                ;;

              watch-logs)
                # Live-follow container logs for N seconds then exit cleanly.
                # Useful for catching transient errors during a known window
                # (e.g. right after a restart, during a test). Capped at 300s
                # (workflow max-runtime is 10min; leaves headroom).
                CONTAINER="wishlist-prod-${LOG_SVC}-1"
                DURATION=$(( WATCH_DURATION > 300 ? 300 : WATCH_DURATION ))
                echo "=== Streaming logs from ${CONTAINER} for ${DURATION}s ==="
                # Use timeout + follow. Add grep filter if provided.
                if [ -n "$LOG_GREP" ]; then
                  timeout "$DURATION" docker logs -f --tail 20 "$CONTAINER" 2>&1 | grep -E "$LOG_GREP" || true
                else
                  timeout "$DURATION" docker logs -f --tail 20 "$CONTAINER" 2>&1 || true
                fi
                echo "=== Stream ended after ${DURATION}s ==="
                ;;

              *)
                echo "ERROR: Unknown action '$ACTION'"
                exit 1
                ;;
            esac

            echo "=== Done ==="
