<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--wb-bg);font-family:var(--wb-font-sans);color:var(--wb-text)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.box{aspect-ratio:1;background:var(--wb-card);border:1px solid var(--wb-border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--wb-text-secondary);gap:2px}
.b{font-weight:800;color:var(--wb-text);font-size:13px}
.s{font-family:ui-monospace,monospace;font-size:10px;color:var(--wb-text-muted)}
</style></head><body class="wb-dark">
<div class="grid">
<div class="box" style="border-radius:4px"><div class="b">4</div><div class="s">xs</div><div>progress</div></div>
<div class="box" style="border-radius:6px"><div class="b">6</div><div class="s">sm</div><div>badges</div></div>
<div class="box" style="border-radius:10px"><div class="b">10</div><div class="s">md</div><div>status pill</div></div>
<div class="box" style="border-radius:12px"><div class="b">12</div><div class="s">lg</div><div>input · thumb</div></div>
<div class="box" style="border-radius:14px;border-color:var(--wb-accent)"><div class="b" style="color:var(--wb-accent-light)">14</div><div class="s">xl ★</div><div>cards · buttons</div></div>
<div class="box" style="border-radius:20px"><div class="b">20</div><div class="s">xxxl</div><div>sheet top</div></div>
<div class="box" style="border-radius:50%"><div class="b">∞</div><div class="s">pill</div><div>avatar · pill</div></div>
</div>
</body></html>
