<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Технические работы — Wishlistik</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #111827;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .emoji {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #f9fafb;
    }
    .ru { display: block; }
    .en { display: block; font-size: 14px; color: #6b7280; margin-top: 4px; }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #9ca3af;
      margin-bottom: 32px;
    }
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:active { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🔧</div>
    <h1>
      <span class="ru">Технические работы</span>
      <span class="en">Maintenance</span>
    </h1>
    <p>
      Сервис временно недоступен.<br>
      Мы уже работаем над этим — загляни через пару минут.<br>
      <br>
      <small>Service is temporarily unavailable.<br>We're already working on it — check back in a few minutes.</small>
    </p>
    <button onclick="window.location.reload()">
      Попробовать снова / Try again
    </button>
  </div>
</body>
</html>
