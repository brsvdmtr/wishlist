<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--wb-bg);font-family:var(--wb-font-sans)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.sw{aspect-ratio:2;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;border:1px solid var(--wb-border)}
.n{font-size:12px;font-weight:700}
.h{font-size:10px;opacity:.75;font-family:ui-monospace,monospace;margin-top:2px}
</style></head><body class="wb-dark">
<div class="row">
<div class="sw" style="background:#7C6AFF"><div class="n">accent</div><div class="h">#7C6AFF</div></div>
<div class="sw" style="background:#9B8AFF"><div class="n">accent-strong</div><div class="h">#9B8AFF</div></div>
<div class="sw" style="background:#A78BFA"><div class="n">accent-light</div><div class="h">#A78BFA</div></div>
<div class="sw" style="background:#5B4BD6"><div class="n">accent-deep</div><div class="h">#5B4BD6</div></div>
</div>
<div class="row">
<div class="sw" style="background:rgba(124,106,255,0.12);color:#A78BFA"><div class="n">accent-soft</div><div class="h">rgba 0.12</div></div>
<div class="sw" style="background:rgba(124,106,255,0.25);color:#C4A7FF"><div class="n">accent-glow</div><div class="h">rgba 0.25</div></div>
<div class="sw" style="background:linear-gradient(135deg,#7C6AFF,#9B8AFF)"><div class="n">grad-accent</div><div class="h">135° 2-stop</div></div>
<div class="sw" style="background:linear-gradient(135deg,#7C6AFF,#9B8AFF 55%,#6B5CE7)"><div class="n">grad-accent-deep</div><div class="h">135° 3-stop</div></div>
</div>
</body></html>
