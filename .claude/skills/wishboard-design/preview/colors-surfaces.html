<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#0c0c0e;font-family:var(--wb-font-sans)}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{aspect-ratio:1.5;border-radius:12px;border:1px solid var(--wb-border);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:var(--wb-text)}
.n{font-size:12px;font-weight:700}
.h{font-size:10px;color:var(--wb-text-muted);font-family:ui-monospace,monospace;margin-top:2px}
</style></head><body class="wb-dark"><div class="grid">
<div class="sw" style="background:#1B1B1F"><div class="n">bg</div><div class="h">#1B1B1F</div></div>
<div class="sw" style="background:#26262C"><div class="n">surface</div><div class="h">#26262C</div></div>
<div class="sw" style="background:#2E2E36"><div class="n">surface-hover</div><div class="h">#2E2E36</div></div>
<div class="sw" style="background:#2F2F38"><div class="n">card</div><div class="h">#2F2F38</div></div>
<div class="sw" style="background:#33333D"><div class="n">card-elevated</div><div class="h">#33333D</div></div>
</div></body></html>
